pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }

// foojay 1.0.0 : version compatible Gradle 9 (supprime la reference cassee IBM_SEMERU)
plugins {
    id("com.facebook.react.settings")
    id("org.gradle.toolchains.foojay-resolver-convention") version("1.0.0")
}

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'TikTokClone'
include ':app'
// Note : le gradle-plugin React Native est déjà inclus via pluginManagement
// (includeBuild en haut de ce fichier). On évite ici le includeBuild en double.
